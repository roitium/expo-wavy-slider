name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to create git tags, commits, and releases
      issues: write   # to comment on issues closed by a release
      pull-requests: write # to comment on PRs closed by a release
      id-token: write # required for NPM Trusted Publishing (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs full history to analyze commits

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build

      - name: Upgrade npm to latest
        # NPM Trusted Publishing (OIDC) requires npm CLI >= 11.5.1
        run: npm install -g npm@latest

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN is omitted as npm CLI will authenticate automatically via OIDC
        run: pnpm exec semantic-release
