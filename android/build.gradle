buildscript {
  repositories {
    mavenCentral()
  }
  dependencies {
    classpath("org.jetbrains.kotlin.plugin.compose:org.jetbrains.kotlin.plugin.compose.gradle.plugin:${kotlinVersion}")
  }
}

apply plugin: 'com.android.library'
apply plugin: 'expo-module-gradle-plugin'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

import groovy.json.JsonSlurper

def packageJsonFile = new File(projectDir, '../package.json')
def packageJson = new JsonSlurper().parseText(packageJsonFile.text)

group = 'expo.modules.wavyslider'
version = packageJson.version

android {
    namespace "expo.modules.wavyslider"
    defaultConfig {
        versionCode 1
        versionName packageJson.version
    }
    buildFeatures {
        compose true
    }
    lintOptions {
        abortOnError false
    }
}

dependencies {
    implementation 'com.facebook.react:react-android'
    implementation 'androidx.compose.foundation:foundation-android:1.10.6'
    implementation 'androidx.compose.ui:ui-android:1.10.6'
    implementation 'androidx.compose.material3:material3:1.5.0-alpha17'
    implementation 'androidx.compose.material3:material3-android:1.5.0-alpha17'
    implementation("ir.mahozad.multiplatform:wavy-slider:2.2.0")
}
